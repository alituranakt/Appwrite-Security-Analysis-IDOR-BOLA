services:
  analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: appwrite-security-analysis:local
    env_file:
      - .env
    working_dir: /app
    command: ["python", "poc/idor_demo.py", "--dry-run"]
    volumes:
      - ./:/app
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  mariadb:
    image: mariadb:11
    profiles: ["lab"]
    environment:
      MARIADB_ROOT_PASSWORD: change-me
      MARIADB_DATABASE: appwrite
      MARIADB_USER: appwrite
      MARIADB_PASSWORD: change-me-too
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mariadb-data:/var/lib/mysql

  appwrite:
    image: appwrite/appwrite:1.8.1
    profiles: ["lab"]
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      _APP_ENV: production
      _APP_WORKER_PER_CORE: "6"
      _APP_OPENSSL_KEY_V1: replace-me
      _APP_DOMAIN: localhost
      _APP_DOMAIN_TARGET: localhost
      _APP_DB_HOST: mariadb
      _APP_DB_PORT: "3306"
      _APP_DB_SCHEMA: appwrite
      _APP_DB_USER: appwrite
      _APP_DB_PASS: change-me-too
      _APP_OPTIONS_ABUSE: enabled
    ports:
      - "8080:80"
    security_opt:
      - no-new-privileges:true

volumes:
  mariadb-data:
