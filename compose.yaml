# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  compose.yaml — Appwrite Security Analysis                            ║
# ║  Tersine Mühendislik Dersi — Vize Projesi                            ║
# ║                                                                       ║
# ║  KULLANIM:                                                            ║
# ║    # Sadece analiz konteyneri (varsayılan):                          ║
# ║    docker compose up analysis                                         ║
# ║                                                                       ║
# ║    # Tam lab ortamı (Appwrite + MariaDB + PoC):                      ║
# ║    docker compose --profile lab up                                   ║
# ║                                                                       ║
# ║  UYARI: Çalıştırmadan önce .env.example → .env kopyalayın           ║
# ║    cp .env.example .env                                               ║
# ╚═══════════════════════════════════════════════════════════════════════╝
#
# SERVİSLER:
#   analysis → PoC runner (her zaman aktif)
#   mariadb  → Veritabanı (sadece --profile lab ile)
#   appwrite → Hedef uygulama (sadece --profile lab ile)
#
# NETWORK MİMARİSİ:
#   analysis-net (bridge) → izole ağ, servisler birbirine hostname ile ulaşır
#   Dışarıya sadece appwrite:8080 açık

services:

  # -------------------------------------------------------------------- #
  #  SERVİS 1: ANALYSIS — PoC Runner (Her zaman aktif)
  # -------------------------------------------------------------------- #
  analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appwrite-poc-analysis
    restart: "no"
    env_file:
      - .env
    environment:
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-http://appwrite:80/v1}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID:-}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY:-}
      - DEBUG=${DEBUG:-false}
      - OUTPUT_FORMAT=${OUTPUT_FORMAT:-json}
    volumes:
      - ./results:/app/results    # Analiz çıktıları host'a yazılır
      - ./logs:/app/logs           # Loglar host'a yazılır
    networks:
      - analysis-net
    # Güvenlik sertleştirme
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50m,noexec
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # -------------------------------------------------------------------- #
  #  SERVİS 2: MARIADB — Veritabanı (--profile lab ile aktif)
  # -------------------------------------------------------------------- #
  mariadb:
    image: mariadb:11
    container_name: appwrite-mariadb
    profiles: [lab]
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-change-me}
      - MYSQL_DATABASE=appwrite
      - MYSQL_USER=appwrite
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-change-me-too}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - analysis-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # -------------------------------------------------------------------- #
  #  SERVİS 3: APPWRITE — Hedef Uygulama (--profile lab ile aktif)
  # -------------------------------------------------------------------- #
  appwrite:
    image: appwrite/appwrite:1.8.1
    container_name: appwrite-target
    profiles: [lab]
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - _APP_ENV=production
      - _APP_DOMAIN=localhost
      - _APP_DOMAIN_TARGET=localhost
      - _APP_OPENSSL_KEY_V1=${APPWRITE_OPENSSL_KEY:-change-this-32-char-secret-key!}
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_USER=appwrite
      - _APP_DB_PASS=${MYSQL_PASSWORD:-change-me-too}
      - _APP_DB_SCHEMA=appwrite
      - _APP_USAGE_STATS=enabled
      - _APP_ABUSE=enabled
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - analysis-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M

# ====================================================================== #
#  NETWORK
# ====================================================================== #
networks:
  analysis-net:
    driver: bridge

# ====================================================================== #
#  VOLUMES (Kalıcı Veri)
# ====================================================================== #
volumes:
  mariadb-data:
