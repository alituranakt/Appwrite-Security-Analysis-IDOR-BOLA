# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  CI/CD Pipeline — Appwrite Security Analysis (IDOR/BOLA)             ║
# ║  Tersine Mühendislik Dersi — Vize Projesi                            ║
# ╚═══════════════════════════════════════════════════════════════════════╝
#
# PIPELINE ADIMLARI:
#   Job 1: lint      → flake8 kod kalitesi (tüm .py dosyaları)
#   Job 2: test      → pytest birim testleri + coverage
#   Job 3: docs      → Dokümantasyon bütünlük kontrolü
#   Job 4: security  → Bandit + pip-audit + shell script taraması
#   Job 5: docker    → Docker imaj build ve test

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "screenshots/**"
      - "results/**"
      - "logs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      skip_security:
        description: "Güvenlik taramasını atla"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: appwrite-security-analysis

# ====================================================================== #
#  JOB 1: KOD KALİTESİ (Lint)
# ====================================================================== #
jobs:
  lint:
    name: "Kod Kalitesi (flake8)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: flake8 kurulumu
        run: pip install flake8

      - name: Shell script izinleri (Linux/Docker uyumluluğu)
        run: |
          find Scripts/ -name "*.sh" -exec chmod +x {} \;
          echo "Shell script izinleri ayarlandı."

      - name: Kritik hata kontrolü (E9, F63, F7, F82)
        run: |
          # Söz dizimi hataları — pipeline'ı DURDURUR
          flake8 poc/ tests/ --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Stil kontrolü (bilgilendirme)
        run: |
          # Stil uyarıları — pipeline'ı DURDURMAZ
          flake8 poc/ tests/ --count --exit-zero \
            --max-complexity=10 --max-line-length=120 --statistics

  # ====================================================================== #
  #  JOB 2: BİRİM TESTLERİ
  # ====================================================================== #
  test:
    name: "Birim Testleri (pytest)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Bağımlılık kurulumu
        run: |
          pip install --upgrade pip
          pip install -r poc/requirements.txt
          pip install pytest pytest-cov

      - name: Testleri çalıştır
        run: |
          pytest tests/ -v --tb=short \
            --cov=poc/utils \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Coverage raporu yükle
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ====================================================================== #
  #  JOB 3: DOKÜMANTASYON KONTROLÜ
  # ====================================================================== #
  docs:
    name: "Dokümantasyon Bütünlüğü"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerekli dosya kontrolü
        run: |
          echo "=== Dokümantasyon Kontrolü ==="
          REQUIRED=(
            "README.md"
            "SECURITY.md"
            "docs/threat-model.md"
            "docs/docker-security-audit.md"
            "docs/ci-cd-analysis.md"
            "docs/source-code-analysis.md"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "  OK  $f  ($(wc -l < "$f") satır)"
            else
              echo "  EKSİK: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          [ $MISSING -eq 0 ] || { echo ""; echo "$MISSING dosya eksik!"; exit 1; }

      - name: Klasör yapısı kontrolü
        run: |
          echo "=== Klasör Yapısı ==="
          REQUIRED_DIRS=(
            "Scripts"
            "poc/utils"
            "tests"
            "docs"
            "config"
            ".github/workflows"
          )
          for d in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$d" ]; then
              echo "  OK  $d/"
            else
              echo "  EKSİK: $d/"
            fi
          done

  # ====================================================================== #
  #  JOB 4: GÜVENLİK TARAMASI
  # ====================================================================== #
  security:
    name: "Güvenlik Taraması"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ github.event.inputs.skip_security != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Güvenlik araçları kurulumu
        run: |
          pip install bandit pip-audit
          pip install -r poc/requirements.txt

      - name: Bandit — Python kaynak kod taraması
        run: |
          bandit -r poc/ tests/ -f json -o bandit-report.json --exit-zero
          bandit -r poc/ tests/ -f screen --exit-zero
        continue-on-error: true

      - name: pip-audit — Bağımlılık güvenlik açığı kontrolü
        run: pip-audit --requirement poc/requirements.txt || true
        continue-on-error: true

      - name: Shell script güvenlik kontrolü
        run: |
          echo "=== Shell Script Güvenlik Analizi ==="
          for f in Scripts/*.sh; do
            echo "Kontrol: $f"
            grep -q "set -euo pipefail" "$f" \
              && echo "  OK  set -euo pipefail mevcut" \
              || echo "  UYARI: Strict mode eksik"
            grep -qE "curl.*(bash|sh)" "$f" \
              && echo "  UYARI: curl|bash kalıbı tespit edildi" \
              || echo "  OK  Tehlikeli curl kalıbı yok"
          done

      - name: .env sızıntı kontrolü
        run: |
          echo "=== .env Sızıntı Kontrolü ==="
          if git log --oneline | head -20 | grep -qi "password\|secret\|token\|api.key"; then
            echo "UYARI: Commit mesajında hassas kelime olabilir"
          else
            echo "OK: Commit geçmişi temiz görünüyor"
          fi
          if [ -f ".env" ]; then
            echo "UYARI: .env dosyası repoda mevcut!"
            exit 1
          else
            echo "OK: .env dosyası repoda yok"
          fi

      - name: Güvenlik raporu yükle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  # ====================================================================== #
  #  JOB 5: DOCKER BUILD VE TEST
  # ====================================================================== #
  docker:
    name: "Docker Build & Test"
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx kurulumu
        uses: docker/setup-buildx-action@v3

      - name: Docker imajı oluştur
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker images | grep ${{ env.IMAGE_NAME }}

      - name: PoC söz dizimi kontrolü (konteynerde)
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -c "
          import py_compile
          py_compile.compile('poc/idor-demo.py', doraise=True)
          print('OK: poc/idor-demo.py')
          "

      - name: Utils modül import testi (konteynerde)
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -c "
          import sys
          sys.path.insert(0, 'poc')
          from utils.http_client import build_endpoint_url, build_auth_headers
          from utils.reporter import generate_summary, to_json_output
          print('OK: poc/utils modülleri import edildi')
          "

      - name: Test süiti (konteynerde)
        run: |
          docker run --rm \
            -e PYTHONPATH=/app/poc \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -m pytest tests/ -v --tb=short 2>&1 || true

      - name: İmaj boyutu kontrolü
        run: |
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "İmaj boyutu: ${SIZE_MB}MB"
          [ "${SIZE_MB}" -lt 500 ] || echo "::warning::İmaj 500MB üzerinde!"
