# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  CI/CD Pipeline - Appwrite Security Analysis (IDOR/BOLA)             ║
# ║                                                                       ║
# ║  Adım 3 Analizi: GitHub Actions CI/CD Pipeline                       ║
# ║  Tersine Mühendislik Dersi - Vize Projesi                           ║
# ╚═══════════════════════════════════════════════════════════════════════╝
#
# === CI/CD PIPELINE ANALİZİ ===
#
# Bu workflow aşağıdaki durumlarda TETİKLENİR (trigger):
#   1. "main" branch'ine push yapıldığında
#   2. "main" branch'ine pull request açıldığında
#   3. Elle tetiklendiğinde (workflow_dispatch)
#
# WEBHOOK AÇIKLAMASI:
#   GitHub Webhook, bir repo'da belirli bir olay gerçekleştiğinde
#   (push, PR, issue vb.) GitHub'ın belirlenen URL'ye HTTP POST
#   isteği göndermesidir. CI/CD bağlamında:
#   - Geliştirici kod push eder → GitHub webhook tetiklenir
#   - Webhook, GitHub Actions runner'ına "yeni iş var" sinyali gönderir
#   - Runner pipeline'ı başlatır (checkout, lint, test, security scan)
#   - Sonuç GitHub'a geri bildirilir (check status)
#
# PIPELINE ADIMLARI:
#   Job 1: lint        → Python kod kalite kontrolü (flake8)
#   Job 2: docs        → Markdown dokümantasyon doğrulama
#   Job 3: security    → Güvenlik taraması (bandit, pip-audit)
#   Job 4: poc-test    → PoC scriptinin çalışabilirlik testi
#   Job 5: docker      → Docker imaj build ve test

name: CI/CD Pipeline - Appwrite Security Analysis

# ====================================================================== #
#  TETIKLEME KURALLARI (Triggers)
# ====================================================================== #
on:
  # Push olayında tetiklenir
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'screenshots/**'     # Ekran görüntüsü değişiklikleri CI tetiklemez
      - 'LICENSE'

  # Pull Request olayında tetiklenir
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

  # Manuel tetikleme (GitHub UI'dan "Run workflow" butonu)
  workflow_dispatch:
    inputs:
      run_security_scan:
        description: 'Güvenlik taraması çalıştır'
        required: false
        default: 'true'
        type: boolean

# ====================================================================== #
#  ORTAM DEĞİŞKENLERİ
# ====================================================================== #
env:
  PYTHON_DEFAULT_VERSION: '3.10'
  DOCKER_IMAGE_NAME: appwrite-security-analysis

# ====================================================================== #
#  JOB 1: KOD KALİTE KONTROLÜ (Linting)
# ====================================================================== #
jobs:
  lint:
    name: "Kod Kalite Kontrolü (Lint)"
    runs-on: ubuntu-latest

    steps:
      # 1. Repo'yu checkout et (kodu indir)
      # Bu adım, runner makinesine Git repo'sunu klonlar
      - name: Checkout repository
        uses: actions/checkout@v4
        # actions/checkout, GitHub'ın resmi checkout action'ıdır
        # v4: En son kararlı sürüm
        # Varsayılan: Sadece son commit'i çeker (shallow clone)

      # 2. Python ortamını kur
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'  # pip bağımlılıklarını cache'le (hızlanma)

      # 3. Lint araçlarını kur
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # 4. flake8 ile PoC scriptinin kod kalitesi kontrolü
      - name: Run flake8 on PoC scripts
        run: |
          # Söz dizimi hataları ve tanımsız isimler (kritik hatalar)
          flake8 poc/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Stil uyarıları (bilgilendirme, pipeline'ı durdurmaz)
          flake8 poc/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # ====================================================================== #
  #  JOB 2: DOKÜMANTASYON DOĞRULAMA
  # ====================================================================== #
  docs:
    name: "Dokümantasyon Kontrolü"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Markdown dosyalarının varlığını ve yapısını kontrol et
      - name: Validate documentation structure
        run: |
          echo "=== Dokümantasyon Yapısı Kontrolü ==="

          # Gerekli dokümantasyon dosyaları
          REQUIRED_DOCS=(
            "README.md"
            "docs/threat-model.md"
            "docs/docker-security-audit.md"
            "docs/ci-cd-analysis.md"
          )

          MISSING=0
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ -f "$doc" ]; then
              echo "✓ $doc mevcut ($(wc -l < "$doc") satır)"
            else
              echo "✗ $doc EKSIK!"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "UYARI: $MISSING dokümantasyon dosyası eksik!"
            exit 1
          fi

          echo ""
          echo "Tüm dokümantasyon dosyaları mevcut."

      # Markdown söz dizimi kontrolü
      - name: Check markdown syntax
        run: |
          pip install mdformat
          echo "=== Markdown Söz Dizimi Kontrolü ==="
          find docs/ -name "*.md" -exec echo "Kontrol: {}" \;
          echo "Markdown kontrolü tamamlandı."

  # ====================================================================== #
  #  JOB 3: GÜVENLİK TARAMASI
  # ====================================================================== #
  security:
    name: "Güvenlik Taraması"
    runs-on: ubuntu-latest
    needs: lint
    # Manuel tetiklemede devre dışı bırakılabilir
    if: ${{ github.event.inputs.run_security_scan != 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -r poc/requirements.txt

      # Bandit: Python kaynak kod güvenlik analizi
      # PoC scriptindeki potansiyel güvenlik sorunlarını tarar
      - name: Run Bandit security scan
        run: |
          bandit -r poc/ -f json -o bandit-report.json --exit-zero
          bandit -r poc/ -f screen --exit-zero
        continue-on-error: true

      # pip-audit: Bağımlılık güvenlik açığı kontrolü
      - name: Check dependency vulnerabilities
        run: pip-audit || true
        continue-on-error: true

      # Shell script güvenlik kontrolü
      - name: Check shell script security
        run: |
          echo "=== Shell Script Güvenlik Analizi ==="
          # set -euo pipefail kontrolü
          for script in Scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Kontrol: $script"
              if grep -q "set -euo pipefail" "$script"; then
                echo "  ✓ Strict mode aktif"
              else
                echo "  ⚠ Strict mode (set -euo pipefail) bulunamadı"
              fi
              if grep -q "curl.*|.*bash" "$script" || grep -q "curl.*|.*sh" "$script"; then
                echo "  ⚠ UYARI: curl | bash kalıbı tespit edildi!"
              fi
            fi
          done

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30

  # ====================================================================== #
  #  JOB 4: PoC TEST (Proof of Concept Doğrulama)
  # ====================================================================== #
  poc-test:
    name: "PoC Script Testi"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r poc/requirements.txt

      # PoC scriptinin import edilebilirliğini kontrol et
      - name: Validate PoC script syntax
        run: |
          echo "=== PoC Script Söz Dizimi Kontrolü ==="
          python -c "
          import py_compile
          import sys
          try:
              py_compile.compile('poc/idor-demo.py', doraise=True)
              print('✓ poc/idor-demo.py söz dizimi doğru')
          except py_compile.PyCompileError as e:
              print(f'✗ Söz dizimi hatası: {e}')
              sys.exit(1)
          "

      # PoC scriptinin help çıktısını kontrol et
      - name: Test PoC help output
        run: |
          cd poc && python idor-demo.py --help || echo "Help parametresi desteklenmiyor (normal)"

  # ====================================================================== #
  #  JOB 5: DOCKER BUILD VE TEST
  # ====================================================================== #
  docker:
    name: "Docker Build & Test"
    runs-on: ubuntu-latest
    needs: [ lint, poc-test ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Docker Buildx: Gelişmiş Docker build özellikleri
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker imajını build et
      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:test .
          docker images | grep ${{ env.DOCKER_IMAGE_NAME }}

      # Konteynerde PoC scriptinin söz dizimini kontrol et
      - name: Test PoC in container
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE_NAME }}:test \
            python -c "import py_compile; py_compile.compile('poc/idor-demo.py', doraise=True); print('OK')"

      # Docker imaj boyutunu kontrol et
      - name: Check image size
        run: |
          IMAGE_SIZE=$(docker image inspect ${{ env.DOCKER_IMAGE_NAME }}:test --format='{{.Size}}')
          IMAGE_SIZE_MB=$((IMAGE_SIZE / 1024 / 1024))
          echo "Docker imaj boyutu: ${IMAGE_SIZE_MB}MB"
          if [ "${IMAGE_SIZE_MB}" -gt 500 ]; then
            echo "::warning::Docker imajı 500MB'dan büyük (${IMAGE_SIZE_MB}MB)!"
          fi
