name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r poc/requirements.txt
          pip install pytest ruff bandit pip-audit

      - name: Lint
        run: |
          ruff check .
          python -m compileall poc tests

      - name: Test
        run: pytest -q

      - name: Bandit
        run: bandit -q -r poc scripts || true

      - name: Pip audit
        run: pip-audit || true

      - name: Secret scan
        run: bash scripts/check-secrets.sh

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test-security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t appwrite-security-analysis:ci .

      - name: Run dry-run inside container
        run: |
          docker run --rm \
            -e APPWRITE_ENDPOINT=http://example.invalid/v1 \
            -e APPWRITE_PROJECT_ID=test-project \
            -e APPWRITE_API_KEY=test-key \
            -e APPWRITE_DATABASE_ID=db \
            -e APPWRITE_COLLECTION_ID=col \
            -e APPWRITE_VICTIM_DOCUMENT_ID=doc \
            appwrite-security-analysis:ci \
            python poc/idor_demo.py --dry-run --json
