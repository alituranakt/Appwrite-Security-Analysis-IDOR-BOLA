# ╔═══════════════════════════════════════════════════════════════════════╗
# ║  Docker Compose - Appwrite Security Analysis (IDOR/BOLA)              ║
# ║                                                                       ║
# ║  Adım 4 Analizi: Docker Compose Mimarisi                             ║
# ║  Tersine Mühendislik Dersi - Vize Projesi                           ║
# ╚═══════════════════════════════════════════════════════════════════════╝
#
# === DOCKER COMPOSE ANALİZİ ===
#
# Bu dosya 3 servis tanımlar:
#   1. appwrite  : Hedef uygulama (Appwrite self-hosted)
#   2. poc       : IDOR/BOLA PoC analiz konteyneri
#   3. mariadb   : Appwrite'ın veritabanı (bağımlılık)
#
# NETWORK MİMARİSİ:
#   analysis-net (bridge): Tüm servisler izole bir ağda iletişim kurar
#   Bu sayede PoC konteyneri, Appwrite'a "appwrite" hostname'i ile erişir
#
# GÜVENLİK ÖNLEMLERİ:
#   - security_opt: no-new-privileges (privilege escalation engellenir)
#   - Kaynak limitleri (CPU, RAM) tanımlı
#   - Hassas veriler environment variable olarak geçilir
#   - Volume mount ile veri kalıcılığı sağlanır

version: '3.8'

# ====================================================================== #
#  SERVİSLER
# ====================================================================== #
services:

  # -------------------------------------------------------------------- #
  #  SERVİS 1: APPWRITE (Hedef Uygulama)
  # -------------------------------------------------------------------- #
  appwrite:
    image: appwrite/appwrite:latest
    container_name: appwrite-target
    restart: unless-stopped
    ports:
      - "8080:80"       # HTTP
      - "8443:443"      # HTTPS
    environment:
      - _APP_ENV=development
      - _APP_DOMAIN=localhost
      - _APP_DOMAIN_TARGET=localhost
      - _APP_OPENSSL_KEY_V1=your-secret-key    # ⚠️ Değiştirin!
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_USER=appwrite
      - _APP_DB_PASS=password                   # ⚠️ Değiştirin!
      - _APP_DB_SCHEMA=appwrite
    volumes:
      - appwrite-uploads:/storage/uploads
      - appwrite-cache:/storage/cache
      - appwrite-config:/storage/config
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - analysis-net
    # Güvenlik: Yeni ayrıcalık kazanımını engelle
    security_opt:
      - no-new-privileges:true
    # Kaynak limitleri
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M

  # -------------------------------------------------------------------- #
  #  SERVİS 2: MARIADB (Veritabanı)
  # -------------------------------------------------------------------- #
  mariadb:
    image: mariadb:10.11
    container_name: appwrite-mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword        # ⚠️ Değiştirin!
      - MYSQL_DATABASE=appwrite
      - MYSQL_USER=appwrite
      - MYSQL_PASSWORD=password                 # ⚠️ Değiştirin!
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - analysis-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # -------------------------------------------------------------------- #
  #  SERVİS 3: PoC RUNNER (Analiz Konteyneri)
  # -------------------------------------------------------------------- #
  poc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appwrite-poc-runner
    depends_on:
      appwrite:
        condition: service_started
    environment:
      - APPWRITE_ENDPOINT=http://appwrite:80/v1
      - APPWRITE_PROJECT_ID=test-project
      - APPWRITE_API_KEY=test-api-key
    volumes:
      - ./results:/app/results        # Analiz sonuçları host'a yazılır
      - ./logs:/app/logs               # Loglar host'a yazılır
    networks:
      - analysis-net
    security_opt:
      - no-new-privileges:true
    # PoC çalışır ve çıkar (daemon değil)
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    # Varsayılan: PoC scriptini çalıştır
    command: ["python", "poc/idor-demo.py"]

# ====================================================================== #
#  NETWORK TANIMLARI
# ====================================================================== #
networks:
  analysis-net:
    driver: bridge
    # İzole ağ: Sadece bu compose'daki konteynerler iletişim kurabilir

# ====================================================================== #
#  VOLUME TANIMLARI (Veri Kalıcılığı)
# ====================================================================== #
volumes:
  appwrite-uploads:
  appwrite-cache:
  appwrite-config:
  mariadb-data:
